name: daily-refresh

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '25 22 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-all.txt
      - name: Build latest universes and snapshots
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python build_everything_full.py
      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner_pro/data/universes/*.csv scanner_pro/data/scans/*.csv scanner_pro/data/scans/*.json scanner_pro/data/macro/latest_snapshot.json macroregime_pro/.cache/latest_snapshot.json macroregime_pro/.cache/latest_snapshot_manifest.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily refresh"
            git push
          fi
